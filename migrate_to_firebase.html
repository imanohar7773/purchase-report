<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Data Migration</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:32px;max-width:480px;width:90%;text-align:center}
h2{color:#1a73e8;margin-bottom:8px}
p{color:#666;font-size:0.9rem;margin-bottom:24px}
button{background:#1a73e8;color:#fff;border:none;padding:14px 32px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
button:disabled{background:#aaa;cursor:not-allowed}
#log{margin-top:20px;text-align:left;font-size:0.82rem;color:#444;max-height:240px;overflow-y:auto}
.item{padding:5px 8px;border-radius:6px;margin-bottom:4px;background:#e8f5e9;color:#1b5e20}
.item.err{background:#fce8e6;color:#c5221f}
.done{background:#e8f0fe;padding:12px;border-radius:8px;font-weight:700;color:#1a73e8;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2>🔥 Firebase Migration</h2>
  <p>Aapki saari 10 purchase entries ek click mein Firebase Firestore mein upload ho jaengi.</p>
  <button id="btn" onclick="migrate()">▶️ Start Migration</button>
  <div id="log"></div>
  <div class="done" id="done">✅ Saari entries Firebase mein save ho gayi! Ab Purchase Report Tool open karo.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVgNHEiedIAz6GJdFNfnGRBPUtX6vM6ko",
  authDomain: "purchase-report-fb978.firebaseapp.com",
  projectId: "purchase-report-fb978",
  storageBucket: "purchase-report-fb978.firebasestorage.app",
  messagingSenderId: "519728871190",
  appId: "1:519728871190:web:edc388a5599cc4c85b8237"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const entries = [
  {inv:"741",date:"2026-06-01",sup:"MAYRA BAKERY AND CAFE",cat:"Bakery",base:2037.24,tax:101.86,total:2139.10,note:"",ts:1780374986042},
  {inv:"YN-13484",date:"2026-06-01",sup:"SHAH SCREEN HOUSE",cat:"Other",base:5805.33,tax:512.64,total:6317.97,note:"",ts:1780375033204},
  {inv:"CI/26-27/0811",date:"2026-06-02",sup:"CHANDRA INTERNATIONAL",cat:"Other",base:680,tax:122.4,total:802.4,note:"",ts:1780375066805},
  {inv:"W/26-27/1132",date:"2026-06-01",sup:"BRIJESH TRADING HOUSE",cat:"Other",base:1230,tax:0,total:1230,note:"",ts:1780375125858},
  {inv:"287",date:"2026-06-01",sup:"YESHA CORPORATION",cat:"Other",base:1860,tax:0,total:1860,note:"",ts:1780375244827},
  {inv:"1521",date:"2026-06-01",sup:"MAHARANI SWEETS & BAKERS",cat:"Other",base:2500,tax:0,total:2500,note:"",ts:1780375318976},
  {inv:"11555",date:"2026-06-02",sup:"QUALITY PANEER CENTER",cat:"Dairy & Paneer",base:3100,tax:0,total:3100,note:"",ts:1780375371852},
  {inv:"LIV/26-27/0923",date:"2026-06-02",sup:"LIVSURE",cat:"",base:10367,tax:518,total:10885,note:"",ts:1780375423260},
  {inv:"KE/1261/2026-27",date:"2026-06-02",sup:"KRISHNA ENTERPRISES",cat:"Other",base:1500,tax:270,total:1770,note:"",ts:1780375454493},
  {inv:"288",date:"2026-06-02",sup:"YESHA CORPORATION",cat:"Other",base:1860,tax:0,total:1860,note:"",ts:1780375501402}
];

window.migrate = async function(){
  let btn = document.getElementById('btn');
  let log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = '⏳ Uploading...';
  log.innerHTML = '';
  let success = 0;

  for(let e of entries){
    try{
      await addDoc(collection(db,'purchases'), e);
      log.innerHTML += `<div class="item">✅ ${e.inv} — ${e.sup} — ₹${e.total}</div>`;
      success++;
    } catch(err){
      log.innerHTML += `<div class="item err">❌ ${e.inv} — ${err.message}</div>`;
    }
    log.scrollTop = log.scrollHeight;
  }

  btn.textContent = `✅ Done! ${success}/10 entries uploaded`;
  if(success === 10) document.getElementById('done').style.display='block';
}
</script>
</body>
</html>
